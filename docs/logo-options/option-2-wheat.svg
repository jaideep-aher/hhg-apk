<?xml version="1.0" encoding="UTF-8"?>
<!-- Option 2 - Stylized wheat ear, symmetrical -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432" width="432" height="432">
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="432" height="432" rx="104" ry="104"/>
    </clipPath>
    <radialGradient id="glow2" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#squircle)">
    <rect width="432" height="432" fill="#F97316"/>
    <rect width="432" height="432" fill="url(#glow2)"/>

    <g fill="#FFFFFF">
      <!-- Central stem -->
      <rect x="210" y="108" width="12" height="236" rx="6" ry="6"/>

      <!-- Top pointed tip -->
      <path d="M 216 92 L 228 120 L 204 120 Z"/>

      <!-- 5 pairs of grain leaves, angled ~60deg up -->
      <!-- Row 1 (top) -->
      <ellipse cx="188" cy="136" rx="30" ry="12" transform="rotate(-55 188 136)"/>
      <ellipse cx="244" cy="136" rx="30" ry="12" transform="rotate( 55 244 136)"/>
      <!-- Row 2 -->
      <ellipse cx="180" cy="176" rx="34" ry="13" transform="rotate(-55 180 176)"/>
      <ellipse cx="252" cy="176" rx="34" ry="13" transform="rotate( 55 252 176)"/>
      <!-- Row 3 -->
      <ellipse cx="174" cy="218" rx="38" ry="14" transform="rotate(-55 174 218)"/>
      <ellipse cx="258" cy="218" rx="38" ry="14" transform="rotate( 55 258 218)"/>
      <!-- Row 4 -->
      <ellipse cx="170" cy="260" rx="40" ry="14" transform="rotate(-55 170 260)"/>
      <ellipse cx="262" cy="260" rx="40" ry="14" transform="rotate( 55 262 260)"/>
      <!-- Row 5 (bottom) -->
      <ellipse cx="168" cy="302" rx="42" ry="15" transform="rotate(-55 168 302)"/>
      <ellipse cx="264" cy="302" rx="42" ry="15" transform="rotate( 55 264 302)"/>

      <!-- Base band under the ear -->
      <rect x="184" y="334" width="64" height="14" rx="7" ry="7"/>
    </g>
  </g>
</svg>
