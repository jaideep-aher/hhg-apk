<?xml version="1.0" encoding="UTF-8"?>
<!--
  HHG Farmers - 512x512 Play Store icon (full-bleed square, no corner clip).
  Google Play applies its own rounded mask on top of this asset.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="#F97316"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Same monogram as the adaptive foreground, centered and scaled to 512 -->
  <g transform="translate(256 256) scale(4.74) translate(-54 -54)" fill="#FFFFFF">
    <rect x="23" y="32" width="14" height="44" rx="2.5" ry="2.5"/>
    <rect x="57" y="32" width="14" height="44" rx="2.5" ry="2.5"/>
    <rect x="23" y="50" width="48" height="10" rx="2.5" ry="2.5"/>
    <path d="M63,32 C66,25 74,21 84,21 C83,27 76,32 68,32 Z"/>
    <path d="M67,30 L80,24" stroke="#F97316" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  </g>
</svg>
