<?xml version="1.0" encoding="UTF-8"?>
<!-- Option 3 - Devanagari "9" (ha) redrawn as a sprout -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432" width="432" height="432">
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="432" height="432" rx="104" ry="104"/>
    </clipPath>
    <radialGradient id="glow3" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#squircle)">
    <rect width="432" height="432" fill="#F97316"/>
    <rect width="432" height="432" fill="url(#glow3)"/>

    <!-- Shirorekha (top horizontal bar, the signature of Devanagari) -->
    <rect x="120" y="124" width="200" height="22" rx="4" ry="4" fill="#FFFFFF"/>

    <!-- Body of 9 - a curved stroke dropping from the bar and sweeping into a leaf -->
    <path
      d="
        M 148 146
        L 148 232
        C 148 286, 196 316, 244 302
        C 288 288, 302 242, 286 212
        C 278 198, 262 192, 248 200
        C 236 206, 232 220, 240 232
      "
      fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Leaf blooming from where the tail would traditionally curl -->
    <path
      d="
        M 280 210
        C 312 196, 346 210, 356 248
        C 330 258, 298 250, 280 232 Z
      "
      fill="#FFFFFF"/>
    <!-- Leaf vein -->
    <path d="M 290 222 L 346 238" stroke="#F97316" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.35"/>

    <!-- Small seed/bud dot above the shirorekha (like a matra) -->
    <circle cx="220" cy="96" r="12" fill="#FFFFFF"/>
  </g>
</svg>
