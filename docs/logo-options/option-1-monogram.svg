<?xml version="1.0" encoding="UTF-8"?>
<!-- Option 1 (final) - HHG monogram "H" with sprouting leaf, safe-zone compliant -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432" width="432" height="432">
  <defs>
    <clipPath id="squircle">
      <!-- Android-style rounded square, ~24% corner radius -->
      <rect x="0" y="0" width="432" height="432" rx="104" ry="104"/>
    </clipPath>
    <radialGradient id="glow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#squircle)">
    <rect width="432" height="432" fill="#F97316"/>
    <rect width="432" height="432" fill="url(#glow)"/>

    <!--
      Coordinates below are the 108-unit Android viewport scaled x4 (to 432).
      Safe zone is 84..348 in both axes.
    -->
    <g transform="scale(4)" fill="#FFFFFF">
      <!-- Left bar of H -->
      <rect x="23" y="32" width="14" height="44" rx="2.5" ry="2.5"/>
      <!-- Right bar of H -->
      <rect x="57" y="32" width="14" height="44" rx="2.5" ry="2.5"/>
      <!-- Crossbar -->
      <rect x="23" y="50" width="48" height="10" rx="2.5" ry="2.5"/>
      <!-- Sprouting leaf -->
      <path d="M63,32 C66,25 74,21 84,21 C83,27 76,32 68,32 Z"/>
      <!-- Leaf vein (orange on white) -->
      <path d="M67,30 L80,24" stroke="#F97316" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    </g>
  </g>
</svg>
