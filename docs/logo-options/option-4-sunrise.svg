<?xml version="1.0" encoding="UTF-8"?>
<!-- Option 4 - Sunrise over a field -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432" width="432" height="432">
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="432" height="432" rx="104" ry="104"/>
    </clipPath>
    <radialGradient id="glow4" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#squircle)">
    <rect width="432" height="432" fill="#F97316"/>
    <rect width="432" height="432" fill="url(#glow4)"/>

    <g fill="#FFFFFF" stroke="none">
      <!-- Half sun (flat bottom at horizon y=220) -->
      <path d="M 216 220 m -78 0 a 78 78 0 0 1 156 0 Z"/>

      <!-- 3 short sun rays above -->
      <rect x="210" y="104" width="12" height="26" rx="6" ry="6"/>
      <rect x="150" y="126" width="24" height="12" rx="6" ry="6" transform="rotate(-40 162 132)"/>
      <rect x="258" y="126" width="24" height="12" rx="6" ry="6" transform="rotate( 40 270 132)"/>
    </g>

    <!-- Three curved field furrows below the horizon -->
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
      <path d="M 104 260 C 216 240, 216 240, 328 260" stroke-width="16"/>
      <path d="M  92 300 C 216 274, 216 274, 340 300" stroke-width="16"/>
      <path d="M  84 340 C 216 310, 216 310, 348 340" stroke-width="16"/>
    </g>
  </g>
</svg>
